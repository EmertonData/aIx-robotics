<style>
  /* Header container: left logo, optional center title, right logo */
  .header-logo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background-color: #f8f9fa;
    border-bottom: 2px solid #dee2e6;
    margin-bottom: 30px;
  }

  .header-logo .left-logo img,
  .header-logo .right-logo img {
    max-height: 70px;
    width: auto;
    display: block;
  }

  /* small screens */
  @media (max-width: 768px) {
    .header-logo { padding: 6px 12px; }
    .header-logo .left-logo img,
    .header-logo .right-logo img { max-height: 50px; }
  }

  .header-logo .center-title {
    flex: 1 1 auto;
    text-align: center;
    color: #343a40;
    font-weight: 500;
    font-size: 1.05rem;
  }
</style>

<div class="header-logo">
  <div class="left-logo"><img src="../assets/emerton/ed_logo.svg" alt="Emerton Data"></div>
  <div class="center-title"></div>
  <div class="right-logo"><img src="../assets/x-hec.png" alt="X-HEC"></div>
</div>
